      subLookup[sub.id] = {sub, subjectKey: subjKey, topicName: topic.name, topicId: topic.id};
    }
  }
}
const countBySub = {};
for (const q of QUESTIONS){
  for (const c of q.cats){
    countBySub[c] = (countBySub[c]||0) + 1;
  }
}

const BATCH_ORDER = ['114-4','115-1','115-2','sample'];
const BATCH_LABEL = {'114-4':'114年第四梯次','115-1':'115年第一次','115-2':'115年第二次','sample':'114年9月樣題'};

let activeBatches = new Set(BATCH_ORDER); // 全開
let currentView = {type:'home'};

// ---------- 關鍵字標註 ----------
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function highlight(text, keywords){
  const esc = escapeHtml(text);
  if (!keywords || !keywords.length) return esc;
  // 依長度排序，避免短詞先蓋掉長詞
  const kws = [...new Set(keywords)].filter(k=>k && k.length>=2).sort((a,b)=>b.length-a.length);
  // 在原始(未跳脫)文字上找位置，因為escapeHtml只轉換 & < >，中英文位置不變，但需對keyword也escape
  const matches = [];
  for (const kw of kws){
    const kwEsc = escapeHtml(kw);
    if (!kwEsc) continue;
    let idx = 0;
    const lowText = esc.toLowerCase();
    const lowKw = kwEsc.toLowerCase();
    while(true){
      const pos = lowText.indexOf(lowKw, idx);
      if (pos === -1) break;
      matches.push([pos, pos+kwEsc.length]);
      idx = pos + kwEsc.length;
    }
  }
  if (!matches.length) return esc;
  matches.sort((a,b)=> a[0]-b[0] || (b[1]-b[0])-(a[1]-a[0]));
  const chosen = [];
  let lastEnd = -1;
  for (const m of matches){
    if (m[0] >= lastEnd){ chosen.push(m); lastEnd = m[1]; }
  }
  let out = '';
  let cursor = 0;
  for (const [s,e] of chosen){
    out += esc.slice(cursor, s);
    out += '<mark class="kw">' + esc.slice(s,e) + '</mark>';
    cursor = e;
  }
  out += esc.slice(cursor);
  return out;
}
function kwForQuestion(q){
  let all = [];
  for (const c of q.cats){
    const info = subLookup[c];
    if (info) all = all.concat(info.sub.kw);
  }
  return all;
}

// ---------- 樹狀選單渲染 ----------
function renderTree(){
  const root = document.getElementById('treeRoot');
  root.innerHTML = '';
  for (const subjKey of ['S1','S2']){
    const subjData = TAX[subjKey];
    const block = document.createElement('div');
    block.className = 'subject-block';
    const head = document.createElement('div');
    head.className = 'subject-head ' + (subjKey==='S1'?'s1':'s2');
    head.textContent = subjData.title;
    block.appendChild(head);

    subjData.topics.forEach((topic, ti)=>{
      const topicDiv = document.createElement('div');
      topicDiv.className = 'topic';
      const topicHead = document.createElement('div');
      topicHead.className = 'topic-head';
      const topicCount = topic.subs.reduce((a,s)=>a+(countBySub[s.id]||0),0);
      topicHead.innerHTML = '<span class="caret">▶</span><span>'+topic.name+'</span>';
      const subsDiv = document.createElement('div');
      subsDiv.className = 'subs';
      topic.subs.forEach(sub=>{
        const n = countBySub[sub.id] || 0;
        const item = document.createElement('div');
        item.className = 'sub-item' + (n===0?' empty':'');
        item.dataset.subId = sub.id;
        item.innerHTML = '<span>'+sub.name+'</span><span class="cnt">'+n+'</span>';
        if (n>0){
          item.addEventListener('click', ()=>{
            selectSub(sub.id);
          });
        }
        subsDiv.appendChild(item);
      });
      topicHead.addEventListener('click', ()=>{
        topicHead.classList.toggle('open');
        subsDiv.classList.toggle('open');
      });
      topicDiv.appendChild(topicHead);
      topicDiv.appendChild(subsDiv);
      block.appendChild(topicDiv);
    });
    root.appendChild(block);
  }
}

function markActiveSub(subId){
  document.querySelectorAll('.sub-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.subId === subId);
  });
}

function openParentsFor(subId){
  const info = subLookup[subId];
  if (!info) return;
  document.querySelectorAll('.sub-item').forEach(el=>{
    if (el.dataset.subId === subId){
      let topicDiv = el.closest('.topic');
      const head = topicDiv.querySelector('.topic-head');
      const subs = topicDiv.querySelector('.subs');
      head.classList.add('open');
      subs.classList.add('open');
    }
  });
}

// ---------- 頁面渲染 ----------
function renderHome(){
  currentView = {type:'home'};
  markActiveSub(null);
  const main = document.getElementById('mainArea');
  const total = QUESTIONS.length;
  const bybatch = {};
  BATCH_ORDER.forEach(b=>bybatch[b]=0);
  QUESTIONS.forEach(q=>bybatch[q.batch_id]++);
  main.innerHTML = `
    <div class="crumbs">首頁</div>
    <h1 class="page-title">學習地圖 × 考古題總覽</h1>
    <p class="page-sub">左側依「科目一學習地圖」與「科目二官方考科大綱」分類，點選細項即可查看對應考古題（一題可能同時出現在多個分類）。</p>
    <div class="kw-legend">💡 題目中的 <b>紅色粗體字</b> 為對應該分類的關鍵字，掃過去就能直覺辨認考點。</div>
    <div class="home-grid">
      <div class="home-card"><h3>考古題總數</h3><div class="n">${total}</div><p>涵蓋 114年第四梯次、115年第一次、115年第二次 ＋ 114年9月官方樣題</p></div>
      <div class="home-card"><h3>已分類</h3><div class="n">${total - QUESTIONS.filter(q=>!q.cats.length).length}</div><p>依關鍵字比對自動歸類至學習地圖 / 官方大綱細項</p></div>
    </div>
    <div class="batch-chips" id="homeBatchChips"></div>
    <p style="margin-top:24px;font-size:13px;color:var(--muted);">👈 從左側選單點選任一細項（例如「1.2 判別式AI：分類任務」或「RAG 與知識檢索」）開始瀏覽該分類下的所有考古題。</p>
  `;
  const chipsWrap = document.getElementById('homeBatchChips');
  BATCH_ORDER.forEach(b=>{
    const chip = document.createElement('span');
    chip.className='chip on';
    chip.textContent = BATCH_LABEL[b] + '（'+bybatch[b]+'題）';
    chipsWrap.appendChild(chip);
  });
}

function renderQuestionCard(q){
  const kws = kwForQuestion(q);
  const stemHtml = highlight(q.stem, kws);
  const subjClass = q.subject==='S1' ? 's1':'s2';
  let optsHtml = '';
  ['A','B','C','D'].forEach(lab=>{
    const val = q.opts[lab];
    if (val===undefined) return;
    const isCorrect = q.ans === lab;
    optsHtml += `<div class="opt${isCorrect?' correct':''}"><span class="lab">(${lab})</span><span>${highlight(val, kws)}</span></div>`;
  });
  const catTags = q.cats.map(c=>{
    const info = subLookup[c];
    const label = info ? info.sub.name : c;
    return `<span class="cat-tag" data-goto="${c}">${label}</span>`;
  }).join('');
  return `
    <div class="qcard">
      <div class="qmeta">
        <span class="badge ${subjClass}">${q.subject==='S1'?'科目一':'科目二'}</span>
        <span class="badge">${BATCH_LABEL[q.batch_id]}</span>
        <span class="qnum">第 ${q.num} 題</span>
        <span class="badge ans">答案 ${q.ans}</span>
      </div>
      <div class="qstem">${stemHtml}</div>
      <div class="opts">${optsHtml}</div>
      <div class="cat-tags">${catTags}</div>
    </div>
  `;
}

function selectSub(subId){
  currentView = {type:'sub', subId};
  markActiveSub(subId);
  openParentsFor(subId);
  const info = subLookup[subId];
  const main = document.getElementById('mainArea');
  const qs = QUESTIONS.filter(q=>q.cats.includes(subId) && activeBatches.has(q.batch_id));
  const kws = info.sub.kw;
  main.innerHTML = `
    <div class="crumbs">${TAX[info.subjectKey].title} ／ ${info.topicName}</div>
    <h1 class="page-title">${info.sub.name}</h1>
    <p class="page-sub">共 ${qs.length} 題考古題</p>
    <div class="kw-legend">關鍵字：${kws.map(k=>'<b>'+escapeHtml(k)+'</b>').join('、')}</div>
    <div class="batch-chips" id="subBatchChips"></div>
    <div class="qlist" id="qlist"></div>
  `;
  renderBatchChips('subBatchChips', ()=>selectSub(subId));
  const listEl = document.getElementById('qlist');
  if (!qs.length){
    listEl.innerHTML = `<div class="empty-state"><div class="big">🗂️</div>目前篩選條件下沒有題目</div>`;
  } else {
    listEl.innerHTML = qs.map(renderQuestionCard).join('');
    listEl.querySelectorAll('.cat-tag').forEach(tag=>{
      tag.addEventListener('click', (e)=>{
        const goto = e.target.dataset.goto;
        if (goto) selectSub(goto);
      });
    });
  }
}

function renderBatchChips(containerId, rerenderFn){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  BATCH_ORDER.forEach(b=>{
    const chip = document.createElement('span');
    chip.className = 'chip' + (activeBatches.has(b) ? ' on':'');
    chip.textContent = BATCH_LABEL[b];
    chip.addEventListener('click', ()=>{
      if (activeBatches.has(b)){
        if (activeBatches.size>1) activeBatches.delete(b);
      } else {
        activeBatches.add(b);
      }
      rerenderFn();
    });
    wrap.appendChild(chip);
  });
}

function renderSearch(term){
  currentView = {type:'search', term};
  markActiveSub(null);
  const main = document.getElementById('mainArea');
  const t = term.trim().toLowerCase();
  const qs = QUESTIONS.filter(q=>{
    if (!activeBatches.has(q.batch_id)) return false;
    const hay = (q.stem + ' ' + Object.values(q.opts).join(' ')).toLowerCase();
    return hay.includes(t);
  });
  main.innerHTML = `
    <div class="crumbs">搜尋結果</div>
    <h1 class="page-title">「${escapeHtml(term)}」的搜尋結果</h1>
    <p class="page-sub">共 ${qs.length} 題符合</p>
    <div class="batch-chips" id="searchBatchChips"></div>
    <div class="qlist" id="qlist"></div>
  `;
  renderBatchChips('searchBatchChips', ()=>renderSearch(term));
  const listEl = document.getElementById('qlist');
  if (!qs.length){
    listEl.innerHTML = `<div class="empty-state"><div class="big">🔍</div>沒有找到符合的題目</div>`;
  } else {
    listEl.innerHTML = qs.map(renderQuestionCard).join('');
    listEl.querySelectorAll('.cat-tag').forEach(tag=>{
      tag.addEventListener('click', (e)=>{
        const goto = e.target.dataset.goto;
        if (goto) selectSub(goto);
      });
    });
  }
}

document.getElementById('searchInput').addEventListener('keydown', (e)=>{
  if (e.key === 'Enter'){
    const v = e.target.value.trim();
    if (v) renderSearch(v);
    else renderHome();
  }
});

renderTree();
renderHome();
</script>
