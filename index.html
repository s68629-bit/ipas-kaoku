<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPAS AI應用規劃師 · 學習地圖考古題庫</title>
<style>
:root{
  --ink:#2b2622;
  --paper:#faf6ee;
  --paper2:#f2ecdf;
  --line:#e2d8c3;
  --accent:#8a4a2f;      /* 赭紅 terracotta-ish but darker, distinct */
  --accent2:#2f5d50;     /* 松綠，用於科目二 */
  --gold:#b8862a;
  --kw:#c1272d;          /* 關鍵字紅 */
  --ans:#1f7a4d;
  --muted:#8a8070;
  --card:#ffffff;
  --shadow: 0 2px 10px rgba(60,45,20,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: "Noto Serif TC","Songti TC","PMingLiU","Microsoft JhengHei",serif;
  background:
    radial-gradient(1200px 800px at 100% -10%, #fff7e6 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  min-height:100vh;
}
.app{
  display:flex;
  min-height:100vh;
}
/* ---------- Sidebar ---------- */
.sidebar{
  width:340px;
  flex-shrink:0;
  background:var(--paper2);
  border-right:1px solid var(--line);
  height:100vh;
  position:sticky;
  top:0;
  overflow-y:auto;
  padding:20px 14px 40px;
}
.brand{
  font-size:15px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:2px;
}
.brand-title{
  font-size:22px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:14px;
  line-height:1.4;
}
.brand-title small{
  display:block;
  font-size:13px;
  font-weight:400;
  color:var(--muted);
  letter-spacing:1px;
  margin-top:2px;
}
.search-box{
  display:flex;
  gap:6px;
  margin-bottom:14px;
}
.search-box input{
  flex:1;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:6px;
  background:var(--card);
  font-family:inherit;
  font-size:14px;
  color:var(--ink);
}
.search-box input:focus{outline:2px solid var(--gold); outline-offset:1px;}
.subject-block{margin-bottom:6px;}
.subject-head{
  font-size:14px;
  font-weight:700;
  padding:10px 8px 6px;
  color:var(--ink);
  border-bottom:2px solid var(--line);
  margin-bottom:4px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.subject-head.s1{color:var(--accent);}
.subject-head.s2{color:var(--accent2);}
.topic{
  margin-bottom:2px;
}
.topic-head{
  cursor:pointer;
  padding:7px 8px;
  font-size:14px;
  font-weight:600;
  border-radius:6px;
  display:flex;
  align-items:center;
  gap:6px;
  user-select:none;
}
.topic-head:hover{background:rgba(0,0,0,0.04);}
.topic-head .caret{
  font-size:10px;
  transition:transform .15s ease;
  color:var(--muted);
  width:10px;
  display:inline-block;
}
.topic-head.open .caret{transform:rotate(90deg);}
.subs{
  padding-left:18px;
  display:none;
}
.subs.open{display:block;}
.sub-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  padding:6px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  color:var(--ink);
  line-height:1.4;
}
.sub-item:hover{background:rgba(0,0,0,0.05);}
.sub-item.active{
  background:var(--gold);
  color:#fff;
}
.sub-item .cnt{
  font-size:11px;
  color:var(--muted);
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  padding:1px 7px;
  flex-shrink:0;
}
.sub-item.active .cnt{
  background:rgba(255,255,255,0.25);
  border-color:transparent;
  color:#fff;
}
.sub-item.empty{opacity:.45; cursor:default;}
.sub-item.empty:hover{background:none;}

/* ---------- Main ---------- */
.main{
  flex:1;
  min-width:0;
  padding:28px 40px 80px;
  max-width:920px;
}
.crumbs{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}
.page-title{
  font-size:26px;
  font-weight:700;
  margin:0 0 6px;
  color:var(--ink);
}
.page-sub{
  color:var(--muted);
  font-size:14px;
  margin-bottom:22px;
}
.kw-legend{
  font-size:12px;
  color:var(--muted);
  margin-bottom:18px;
  padding:8px 12px;
  background:var(--card);
  border:1px dashed var(--line);
  border-radius:8px;
  display:inline-block;
}
.kw-legend b{color:var(--kw);}

.qlist{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.qcard{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:var(--shadow);
  padding:16px 18px;
}
.qmeta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
  flex-wrap:wrap;
}
.badge{
  font-size:11px;
  padding:2px 8px;
  border-radius:20px;
  background:var(--paper2);
  color:var(--muted);
  border:1px solid var(--line);
}
.badge.s1{color:var(--accent); border-color:var(--accent);}
.badge.s2{color:var(--accent2); border-color:var(--accent2);}
.badge.ans{
  background:var(--ans);
  color:#fff;
  border:none;
  font-weight:700;
}
.qnum{font-size:12px; color:var(--muted);}
.qstem{
  font-size:16px;
  line-height:1.85;
  margin-bottom:10px;
}
.opts{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.opt{
  display:flex;
  gap:8px;
  padding:7px 10px;
  border-radius:7px;
  background:var(--paper);
  border:1px solid transparent;
  font-size:14.5px;
  line-height:1.7;
}
.opt.correct{
  border-color:var(--ans);
  background:#eefaf2;
}
.opt .lab{
  font-weight:700;
  color:var(--muted);
  flex-shrink:0;
}
.opt.correct .lab{color:var(--ans);}
mark.kw{
  background:none;
  color:var(--kw);
  font-weight:700;
  padding:0;
}
.cat-tags{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.cat-tag{
  font-size:11px;
  color:var(--gold);
  background:#fbf3df;
  border:1px solid #eadcb5;
  border-radius:20px;
  padding:2px 9px;
  cursor:pointer;
}
.cat-tag:hover{background:var(--gold); color:#fff;}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}
.empty-state .big{font-size:40px; margin-bottom:10px;}

.home-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:10px;
}
.home-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:18px 20px;
  box-shadow:var(--shadow);
}
.home-card h3{margin:0 0 8px; font-size:16px;}
.home-card .n{font-size:32px; font-weight:800; color:var(--gold);}
.home-card p{font-size:13px; color:var(--muted); margin:4px 0 0;}
.batch-chips{
  display:flex; gap:8px; flex-wrap:wrap; margin-top:16px;
}
.chip{
  font-size:12px;
  padding:4px 12px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  cursor:pointer;
}
.chip.on{background:var(--ink); color:#fff; border-color:var(--ink);}

@media (max-width: 860px){
  .app{flex-direction:column;}
  .sidebar{
    width:100%;
    height:auto;
    position:relative;
    max-height:46vh;
  }
  .main{padding:20px 16px 60px; max-width:100%;}
  .home-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">iPAS 初級能力鑑定</div>
    <div class="brand-title">AI應用規劃師<small>學習地圖 × 考古題庫</small></div>
    <div class="search-box">
      <input id="searchInput" type="text" placeholder="搜尋題目關鍵字…">
    </div>
    <div id="treeRoot"></div>
  </nav>
  <main class="main" id="mainArea"></main>
</div>

vised Learning）","D":"遷移學習（Transfer Learning）"},"cats":["t3-1a","t3-1d","t3-1b"],"kw_hits":["Reinforcement Learning","Unsupervised Learning","Supervised Learning","非監督式學習","監督式學習","行動","策略"]},{"id":"114-4-S1-18","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":18,"ans":"C","stem":"關於Q-Learning與Deep Q-Learning，下列敘述何者最正確？","opts":{"A":"Q-Learning與Deep Q-Learning的差異在於是否使用標記資料作為學習基礎","B":"Q-Learning可處理任意維度的狀態空間，因此比Deep Q-Learning更靈活","C":"Deep Q-Learning透過深度神經網路近似Q值，避免了Q表在高維空間中難以擴展的問題","D":"Deep Q-Learning無法搭配經驗回放（Experience Replay），因為會導致樣本順序被打亂"},"cats":["t3-1d"],"kw_hits":["Q-Learning","狀態"]},{"id":"114-4-S1-19","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":19,"ans":"A","stem":"在訓練機器學習模型時，若任務為預測房價，應選用下列哪一種損失函數（Loss Function）來衡量預測誤差？","opts":{"A":"均方誤差（MSE）","B":"交叉熵損失（Cross-Entropy Loss）","C":"Hinge損失（Hinge Loss）","D":"KL散度（Kullback-Leibler Divergence）"},"cats":["t4-2"],"kw_hits":["Cross-Entropy","均方誤差","交叉熵","MSE"]},{"id":"114-4-S1-20","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":20,"ans":"A","stem":"某醫院希望開發一個系統，根據患者的年齡、血壓與BMI等資訊，預測第一科：人工智慧基礎概論其罹患糖尿病的機率（0~1），並依據預測值是否超過0.5做出風險警示。下列哪一種模型最適合用於此分類任務？","opts":{"A":"邏輯迴歸（Logistic Regression）","B":"支援向量機（Support Vector Machine）","C":"決策樹（Decision Tree）","D":"K平均演算法（K-means）"},"cats":["t1-2b","t3-2a"],"kw_hits":["Logistic Regression","支援向量機","邏輯迴歸","分類任務","決策樹"]},{"id":"114-4-S1-21","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":21,"ans":"D","stem":"某金融科技公司正開發一套違約風險預測系統，需大量處理不同客戶的財務特徵資料。考量到資料特徵數量眾多，且希望提升預測的穩定性與泛化能力，下列哪一種鑑別式AI模型最適合？","opts":{"A":"邏輯迴歸（Logistic Regression）","B":"支援向量機（Support Vector Machine）","C":"決策樹（Decision Tree）","D":"隨機森林（Random Forest）"},"cats":["t1-2b","t3-2a"],"kw_hits":["Logistic Regression","鑑別式AI","支援向量機","邏輯迴歸","隨機森林","決策樹"]},{"id":"114-4-S1-22","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":22,"ans":"C","stem":"關於變分自編碼器（Variational Autoencoder, VAE）的運作流程，下列何者敘述最為正確？","opts":{"A":"解碼器的任務是將低維壓縮向量分類為不同類別","B":"編碼器將輸入資料轉換為可視化圖像以利模型學習","C":"編碼器將資料轉換為潛在空間表示，解碼器再重建資料","D":"編碼器利用最大邊際機率對資料進行異常點偵測"},"cats":["t5-1b","t4-5"],"kw_hits":["Encoder","變分自編碼器","潛在空間","編碼器","VAE","解碼器"]},{"id":"114-4-S1-23","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":23,"ans":"D","stem":"下列何者不是我國數位發展部AI產品與系統評測中心對生成式AI的評測項目?","opts":{"A":"當責性","B":"可靠性","C":"隱私及資安","D":"互動性"},"cats":["t1-2a","t1-4"],"kw_hits":["AI產品與系統評測中心","生成式AI"]},{"id":"114-4-S1-24","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":24,"ans":"C","stem":"在保持GPT-OSS模型架構不變的前提下，如果將模型參數量從20億提升至120億，並假設有足夠的訓練資料支撐，下列敘述何者最正確？","opts":{"A":"模型參數增加會線性提升效能，且即使訓練資料不變也不會遇到瓶頸","B":"參數越多模型推理越快，因為每層可以並行計算更多參數","C":"較大的參數量能提升模型的表達能力與預測效能，但需足夠訓練資料支持","D":"增加參數量不影響記憶體使用，只會影響計算速度"},"cats":["t5-2a","t4-5"],"kw_hits":["GPT-OSS","GPT"]},{"id":"114-4-S1-25","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":25,"ans":"C","stem":"在自然語言處理任務中，為了減少訓練語料中偏見對模型的影響，下列第一科：人工智慧基礎概論哪種資料處理策略屬於常見的「資料去偏（Data Debiasing）」做法？","opts":{"A":"讓模型在訓練時隨機替換輸出，以抵消資料中存在的系統性偏差","B":"增加模型的參數量，依賴更大的模型自動消除原始資料中的偏見","C":"調整或擴充訓練語料，使不同群體或類型資料的比例更加平衡，避免模型過度偏向出現頻率高的類別","D":"對訓練資料施加額外正則化或噪音，使模型在學習過程中對偏見敏感度降低"},"cats":["t4-1","t3-1d","t6-1"],"kw_hits":["Bias","正則化","策略"]},{"id":"114-4-S1-26","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":26,"ans":"D","stem":"在深度學習模型的微調（Fine-tuning）過程中，可能出現所謂的「災難性遺忘（Catastrophic Forgetting）」。此現象最可能造成哪種情況？","opts":{"A":"由於計算資源或訓練步驟不足，模型在微調過程中無法完整收斂，導致學習效果受限","B":"微調後模型的表現變得隨機，無法有效記憶新學到的模式與知識","C":"微調後模型的部分權重產生偏移，導致模型無法針對較長的文字進行回應","D":"模型過度適應微調的資料分佈，逐漸遺忘先前預訓練所獲得的廣泛知識，在原有任務或廣泛領域上表現變差"},"cats":["t5-2a"],"kw_hits":["Fine-tuning","預訓練","微調"]},{"id":"114-4-S1-27","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":27,"ans":"B","stem":"在大型Transformer模型的效能優化過程中，常見的方法之一是「剪枝（Pruning）」。下列哪一項最符合該方法的核心概念？","opts":{"A":"將模型中所有權重按比例縮小，使其值更接近零，以降低計算量","B":"移除模型中影響較小或冗餘的部分權重參數，以減少模型大小並提升推理效率","C":"在訓練時僅更新部分權重而將其他權重凍結，從而減少需要調整的參數數量","D":"根據注意力分數動態跳過處理部分輸入Token，以減少每次前向傳播的計算"},"cats":["t4-1","t6-1","t1-1","t4-5"],"kw_hits":["Transformer","Pruning","剪枝","權重"]},{"id":"114-4-S1-28","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":28,"ans":"D","stem":"對非常長的輸入序列進行推理（Inference），Transformer模型推理的主要計算瓶頸通常是什麼？","opts":{"A":"模型輸出層產生文本的過程，因為每生成一個詞都必須重新訓練整個模型一次","B":"詞嵌入(Embedding)查找操作，因為其時間複雜度隨詞彙表大小指數級增長","C":"Softmax函數的計算，因為對每個Token都需要執行繁重的運算","D":"自注意力層的計算和其記憶體使用，因為注意力矩陣的大小隨序列長度呈平方級增長第一科：人工智慧基礎概論"},"cats":["t4-5","t1-1","t4-1","t5-2d"],"kw_hits":["Transformer","Embedding","Softmax","自注意力"]},{"id":"114-4-S1-29","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":29,"ans":"A","stem":"在「可解釋人工智慧（Explainable AI, XAI）」領域中，LIME（Local Interpretable Model-agnostic Explanations）方法最核心的應用目的是什麼？","opts":{"A":"解釋單一樣本（局部預測）的黑箱模型決策過程","B":"全面提升黑箱模型整體的預測準確度","C":"將黑箱模型轉換成完全可解釋的模型作為替代","D":"用於生成大量擬真數據來替代訓練集"},"cats":["t6-3"],"kw_hits":["Explainable AI","LIME","可解釋","XAI"]},{"id":"114-4-S1-30","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":30,"ans":"A","stem":"在醫療診斷決策支援系統等高風險領域中，「可解釋人工智慧（Explainable AI, XAI）」的核心價值最主要呈現在哪個面向？","opts":{"A":"透過提供可理解的決策依據，促進患者與醫療專業人員對系統診斷結果的信任與接受度","B":"以可解釋性方法優化臨床資料蒐集與管理流程，從而降低整體醫療作業成本","C":"利用解釋機制增強模型預測的統計顯著性與準確度，使其在研究及實務應用中更具科學性","D":"透過提供透明化的運作過程，進而減輕臨床人員負擔，並提升醫療服務的整體效率"},"cats":["t6-3"],"kw_hits":["Explainable AI","可解釋","XAI"]},{"id":"114-4-S1-31","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":31,"ans":"D","stem":"在金融科技公司的信貸決策系統中，導入反事實解釋（Counterfactual Explanation）時，實際部署往往伴隨技術與監管挑戰。下列哪一項最符合該情境下的核心挑戰？","opts":{"A":"需要建立完整的客戶行為預測模型來估算建議改變的實施成本，並整合到現有的風險管理系統架構中","B":"必須使用聯邦學習技術保護客戶隱私，同時在分散式環境中計算跨機構的反事實解釋結果","C":"需要建構時間序列因果圖來處理客戶信用狀況的動態變化，並預測未來可能的信用評分軌跡","D":"生成的反事實樣本必須滿足特徵間的因果約束和業務邏輯約束，同時確保建議的改變在現實中具有可操作性且符合公平放貸法規"},"cats":["t6-3"],"kw_hits":["Counterfactual","反事實解釋"]},{"id":"114-4-S1-32","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":32,"ans":"B","stem":"在統計推論中，若樣本來自母體但呈現明顯偏態分布，且樣本數有限，下列哪一項策略最能減少推估母體參數的偏誤？","opts":{"A":"直接使用樣本平均數與變異數估計母體參數，不做任何調整","B":"增加樣本數並考慮使用分位數或中位數作為中心趨勢估計","C":"將樣本隨機重新排列後，多次計算平均值以消除偏態影響","D":"完全依賴樣本標準差來估計母體參數，忽略分布形態第一科：人工智慧基礎概論"},"cats":["t2-2"],"kw_hits":["平均數","變異數","中位數","標準差"]},{"id":"114-4-S1-33","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":33,"ans":"D","stem":"在工業物聯網架構中，進行設備預測性維護（Predictive Maintenance）時，若面對異常事件發生頻率極低、樣本高度不平衡的時間序列資料，下列哪一種方法最能兼顧模型穩定性與異常偵測效能？","opts":{"A":"將每筆異常事件資料複製多次以提升模型對異常的辨識敏感度，搭配全序列訓練模型（如LSTM）","B":"對時間序列進行差分與標準化後，使用傳統監督式學習模型（如SVM）進行分類訓練","C":"使用經過時間序列特化的SMOTE技術生成異常樣本，以平衡異常與正常資料比例","D":"採用基於重建誤差的自編碼器模型（Sequence-to-Sequence Autoencoder）進行異常偵測，並僅使用正常資料進行訓練"},"cats":["t4-4"],"kw_hits":["LSTM","時間序列"]},{"id":"114-4-S1-34","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":34,"ans":"C","stem":"在零售業進行客戶行為分析時，資料倉儲中發現多個欄位儲存相同的購買金額資訊（例如：amount_usd、total_price、transaction_value），但其單位、命名慣例及格式不一致，進而導致特徵工程階段混淆模型輸入。針對此種跨欄位語義重疊與結構冗餘問題，下列哪一種資料處理策略最合適且具實務可行性？","opts":{"A":"利用資料探勘技術自動選擇資料集中對目標變數最敏感的欄位，其他欄位捨棄即可，避免過度清理干擾原始結構","B":"保留所有相似欄位，交由高階模型（如Gradient Boosting或Deep Learning）自動學習特徵關聯，無需手動處理","C":"建立欄位命名標準，統一金額單位與格式，進行欄位正規化與語義合併，減少重複資訊影響特徵重要性估計","D":"將重複欄位視為類別欄位，進行One-hot編碼（One-hot encoding）後輸入模型，以避免數值誤導模型學習過程"},"cats":["t3-1d","t4-5"],"kw_hits":["Action","Value","策略"]},{"id":"114-4-S1-35","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":35,"ans":"D","stem":"某大型零售企業準備將商品推薦模型上線，專案團隊在檢視訓練資料時，發現部分商品類別（例如高價商品）樣本數量極少，而多數樣本集中於低價商品。若此不平衡問題未妥善處理，下列何種狀況最可能在實際推薦結果中發生？","opts":{"A":"模型在預測時傾向輸出稀有類別，導致雖能捕捉到少數樣本，但精確率（Precision）顯著下降","B":"模型由於類別分布不均，難以建立有效的線性分離邊界，進而無法收斂","C":"模型過度聚焦於稀有類別樣本，導致對多數類別的預測能力下降，整體效能受損；第一科：人工智慧基礎概論","D":"模型學到的決策邊界主要由多數類別主導，忽視了稀有類別，造成該類別的召回率（Recall）大幅降低"},"cats":["t1-2d","t6-2"],"kw_hits":["Precision","Recall","召回率"]},{"id":"114-4-S1-36","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":36,"ans":"C","stem":"某電商資料團隊要協助行銷部門規劃再行銷策略。目前取得資料包含使用者點擊、購買紀錄、流量來源與轉換率。若資料團隊希望先進行探索性資料分析（EDA），下列哪一項最符合EDA的做法？","opts":{"A":"建立隨機森林模型，預測使用者是否會完成購買","B":"使用K-means對使用者群進行分群並立即制定對應促銷策略","C":"繪製各類流量來源對轉換率的關聯圖，尋找潛在關係","D":"對不同購物路徑設定統計假設並進行雙樣本t檢定"},"cats":["t2-3","t3-1b","t1-2b","t3-1d","t3-2c"],"kw_hits":["探索性資料分析","K-Means","隨機森林","EDA","策略","分群"]},{"id":"114-4-S1-37","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":37,"ans":"B","stem":"某金融科技公司在利用歷史交易資料建立風險控管模型時，嘗試推估整體詐騙交易比例。近期發現，樣本間存在明顯的時間序列相關性，導致模型在實際偵測新交易時誤判率升高。若希望同時改善詐騙比例推估的準確性並提升模型的穩健性，下列哪一種做法最為合適？","opts":{"A":"擴充樣本數量，以涵蓋更多潛在的詐騙型態，但維持既有的隨機抽樣方式不變","B":"採取時間序列敏感的抽樣策略，例如依據交易時間區間進行分層，以保存原始的時間結構特性","C":"將資料完全隨機打散，以降低序列相關性對模型訓練造成的影響","D":"在模型評估時，針對相鄰時間區段進行誤差合併，以便用整體估計方式修正詐騙比例"},"cats":["t4-4"],"kw_hits":["時間序列"]},{"id":"114-4-S1-38","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":38,"ans":"C","stem":"某公司建置基於檢索增強生成（RAG）的知識查詢系統，需同時兼顧查詢效能與資料的即時更新。近期發現回應內容偶爾過時，且每次更新文件都需完整重建索引，導致系統在更新期間無法服務。若要解決此問題並提升整體穩健性，下列哪項做法最適合？","opts":{"A":"調整生成模型的回應隨機性參數，以降低答案偏差並提升一致性","B":"提升檢索與索引的運算效能，以縮短查詢與更新所需時間","C":"採用索引的增量或分段更新方式，使新資料能即時納入而不需全部重建","D":"建立常見問題的標準答案集，透過快速檢索回應以降低模型負擔"},"cats":["t5-2d"],"kw_hits":["檢索增強生成","RAG"]},{"id":"114-4-S1-39","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":39,"ans":"A","stem":"某醫院計畫開發住院日數預測模型，以協助病房調度。多數病人的住院日數集中在3–7天，但仍有少數重症患者因治療需求而住院日數明顯偏長。醫院希望採用一種合適的評估方式，既能兼顧大部分病人的預測準確度，也能確保對重症個案的預測維持穩健。下列哪一種方法最符合此需求？第一科：人工智慧基礎概論","opts":{"A":"在模型檢核時，同時呈現平均絕對誤差（MAE）與重症子群的誤差指標","B":"僅針對一般病人樣本進行交叉驗證，以避免重症個案拉高誤差","C":"將所有病人的住院日數進行標準化處理，以減少數值範圍差異的影響","D":"只採用單一的整體決定係數(R²)作為模型優劣的判斷依據"},"cats":["t4-2","t3-1b"],"kw_hits":["平均絕對誤差","交叉驗證","MAE"]},{"id":"114-4-S1-40","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":40,"ans":"D","stem":"關於監督式學習（Supervised Learning）與非監督式學習（Unsupervised Learning）的目標，下列敘述何者錯誤？1.非監督式學習的核心在於發掘資料內在結構，例如分群、關聯規則與降維，而不依賴外部標籤。2.監督式學習的典型應用為分類與迴歸，通常不適合應用於異常偵測任務。3.非監督式學習若搭配少量標註資料，即會完全轉化為監督式學習。4.監督式學習仰賴已標註的資料集，透過最小化輸出與真實標籤之間的差距，學習輸入與目標之間的對應函數。5.所有監督式學習任務都必須要有大量完整標註資料，否則無法進行任何有效的模型訓練。6.非監督式學習不需要目標變數，僅透過輸入資料本身的特徵分布進行模式學習。","opts":{"A":"3、5、6","B":"1、4、6","C":"2、4、6","D":"2、3、5"},"cats":["t3-1a","t3-1b"],"kw_hits":["Unsupervised Learning","Supervised Learning","非監督式學習","監督式學習","降維","分群"]},{"id":"114-4-S1-41","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":41,"ans":"D","stem":"一家旅遊平台希望建立模型，預測顧客下次是否會再次透過該平台訂房。資料包含：顧客ID、年齡、旅遊次數、平均花費金額、主要交通方式（火車/飛機/自駕/公車）、會員等級（普通/進階/白金）、是否為海外旅遊等。下列哪一種特徵工程方法最適合處理「主要交通方式」欄位？","opts":{"A":"布林轉換（Boolean Conversion）","B":"序數編碼（Ordinal Encoding）","C":"數值標準化（Numerical Standardization）","D":"One-hot編碼（One-hot Encoding）"},"cats":["t2-2","t3-3"],"kw_hits":["Numeric","標準化"]},{"id":"114-4-S1-42","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":42,"ans":"C","stem":"一家跨國醫療研究機構希望利用各地醫院的病患資料，建立一個能夠預測疾病早期風險的機器學習模型。由於各國法規限制，病患的原始資第一科：人工智慧基礎概論料無法集中到單一伺服器。在此情境下，下列哪一種方法最能同時滿足「各醫院保留資料不外流」與「模型仍能跨院學習」的需求？","opts":{"A":"資料匿名化（Data Anonymization）","B":"差分隱私（Differential Privacy）","C":"聯邦學習（Federated Learning）","D":"交叉驗證（Cross-validation）"},"cats":["t2-1","t3-1b"],"kw_hits":["Cross-validation","Anonymization","差分隱私","交叉驗證","匿名化"]},{"id":"114-4-S1-43","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":43,"ans":"D","stem":"某公司欲建立員工離職風險預測模型，資料集中包含「年度績效分數」、「平均每月加班時數」、「年齡」等數值型特徵。由於各特徵的數值範圍差異極大（例如績效分數1–5、加班時數0–80、年齡20–65），若直接輸入至使用梯度下降的邏輯迴歸(Logistic Regression)模型，可能導致模型收斂緩慢或權重偏斜。為提升模型訓練效率與準確度，下列哪一種特徵工程方法最適合應用於這些數值特徵？","opts":{"A":"布林轉換（Boolean Conversion）","B":"時間序列分解（Time Series Decomposition）","C":"One-hot編碼（One-hot Encoding）","D":"數值標準化（Numerical Standardization）"},"cats":["t1-2b","t3-2a","t1-2c","t2-2","t4-4"],"kw_hits":["Logistic Regression","Regression","Numeric","邏輯迴歸","時間序列"]},{"id":"114-4-S1-44","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":44,"ans":"C","stem":"在機器學習中，「叢集（Clustering）」方法最典型的應用情境是下列何者？","opts":{"A":"根據歷史交易紀錄與已標註的詐欺案例，訓練模型來偵測未來的詐欺交易","B":"使用醫療數據與病患的診斷標籤，建立模型以預測病人是否罹患特定疾病","C":"根據顧客的消費行為與特徵，將顧客自動劃分為數個群組，以便進行差異化行銷","D":"透過大量已標註影像，訓練深度學習模型來辨識照片中的物件種類"},"cats":["t3-1b"],"kw_hits":["Clustering"]},{"id":"114-4-S1-45","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":45,"ans":"C","stem":"某醫院研究團隊蒐集了大量病患的「收縮壓」數據，經檢驗後顯示此數值大致呈現常態分布。在進行後續模型分析前，研究人員希望妥善處理可能存在的極端血壓數值。下列哪一種做法最為合適？","opts":{"A":"將所有極端偏高或偏低的血壓數據直接刪除，以保留最具代表性的病患樣本","B":"使用對數轉換（Log Transformation），將數據壓縮至更接近常態，以降低極端值的影響","C":"透過Z分數（Z-score）或標準差範圍檢測異常值，並依研究需求決定是否調整或移除；第一科：人工智慧基礎概論","D":"將檢測到的離群值以Label Encoding編碼，轉換為序號標籤以避免影響原始分布"},"cats":["t3-3","t2-1","t2-2"],"kw_hits":["Z-score","標準差","極端值"]},{"id":"114-4-S1-46","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":46,"ans":"B","stem":"某電商公司想預測用戶是否會購買特定商品，資料中包含多種用戶屬性與行為特徵。分析師希望選出對購買結果最有預測價值的特徵，以提升模型效能。下列哪一種描述最符合監督式特徵選擇（Supervised Feature Selection）的概念？","opts":{"A":"根據特徵的整體分布、變異度或資訊量進行篩選，而不直接參考目標變數","B":"評估每個特徵與目標變數之間的相關性，選擇對預測結果貢獻最大的特徵","C":"使用模型評估特徵對預測結果的重要性，並保留對目標變數影響較大的欄位","D":"將特徵透過降維方法（如PCA）轉換為新特徵，再用於模型訓練"},"cats":["t3-1b","t3-3","t3-4"],"kw_hits":["特徵選擇","PCA","降維"]},{"id":"114-4-S1-47","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":47,"ans":"B","stem":"在訓練神經網路時，為了提升模型收斂速度與穩定性，避免梯度消失或梯度爆炸，下列哪一種做法最常被使用？","opts":{"A":"對輸入資料進行隨機旋轉或水平翻轉，以增加資料多樣性","B":"選用ReLU或其變體作為隱藏層的啟動函數，以改善梯度傳播","C":"減少樣本量提升訓練速度","D":"對目標變數或特徵進行標準化"},"cats":["t4-1"],"kw_hits":["ReLU","梯度爆炸","梯度消失","神經網路"]},{"id":"114-4-S1-48","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":48,"ans":"A","stem":"若希望檢視某一連續型數據的分布情形（如集中程度、偏態或是否呈現多峰），下列哪一種應用情境最適合使用直方圖（Histogram）來進行分析？","opts":{"A":"探討顧客年齡資料的整體分布特徵，並檢視是否存在異常集中或分散現象","B":"比較不同商品在各月份的銷售額變化趨勢，以觀察季節性波動","C":"追蹤公司近一年營收的時間序列變化，以了解整體成長趨勢","D":"檢視產品價格與月銷售量之間的關聯性，以評估是否具線性相關"},"cats":["t4-4","t2-3"],"kw_hits":["時間序列","直方圖"]},{"id":"114-4-S1-49","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":49,"ans":"A","stem":"下列何者並非我國數位發展部AI產品與評測中心在評估大型語言模型安全性時，所指出的常見使用指標？","opts":{"A":"資料複雜性","B":"事實正確性","C":"偏見與歧視","D":"惡意與濫用可能性"},"cats":["t5-2a"],"kw_hits":["大型語言模型"]},{"id":"114-4-S1-50","subject":"S1","batch":"114年第四梯次","batch_id":"114-4","num":50,"ans":"A","stem":"某雲端服務公司計畫將大型語言模型部署於線上系統，並以批次推論第一科：人工智慧基礎概論（Batch Inference）方式處理每日上百萬筆用戶請求。專案團隊在評估可能遇到的挑戰時，下列哪一項通常不會被視為批次推論階段的主要難題？","opts":{"A":"如何確保訓練語料的涵蓋性與標註品質，以避免模型偏差影響輸出","B":"當批次規模增大時，如何降低推論延遲並保持即時回應能力","C":"在推論過程中，有效管理與分配龐大的輸入資料量以避免資源壅塞","D":"在叢集環境中精確安排推論任務，以提升GPU/TPU等硬體資源的利用率"},"cats":["t1-3"],"kw_hits":["Batch Inference","批次推論","GPU","TPU"]},{"id":"114-4-S2-1","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":1,"ans":"B","stem":"在Low Code平台的開發應用設計中，關於「模型（Model）」，下列敘述何者最符合實際情況？","opts":{"A":"模型僅扮演設計視覺化的輔助工具，對應用邏輯的影響有限","B":"模型是用來抽象描述資料結構、業務流程與介面邏輯的核心元素，影響應用的設計與維護","C":"模型僅依循UML（Unified Modeling Language）等傳統建模方式，缺乏針對Low Code環境的延展性","D":"模型在Low Code平台中已被自動程式碼生成全面取代，實際價值有限"},"cats":["g1-1"],"kw_hits":["Low Code"]},{"id":"114-4-S2-2","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":2,"ans":"D","stem":"企業在導入生成式AI平台時，往往需要利用分散於不同部門或機構中的大量敏感文本資料。若希望在確保隱私的前提下，仍能讓模型持續優化並降低資料外洩風險，下列哪一種方法最適合？","opts":{"A":"同態加密（Homomorphic Encryption）","B":"安全多方計算（Secure Multi-party Computation）","C":"零知識證明（Zero-knowledge Proofs）","D":"聯邦學習（Federated Learning）"},"cats":["g6-2"],"kw_hits":["Homomorphic Encryption","Federated Learning","零知識證明","聯邦學習","同態加密","隱私"]},{"id":"114-4-S2-3","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":3,"ans":"B","stem":"某企業利用No Code/Low Code平台開發內部營運系統。為確保系統在跨部門流程與外部服務整合下仍具良好的可測試性（Testability），下列哪一項作法最為合適？","opts":{"A":"依賴No Code/Low Code平台提供的即時預覽與基本單元測試功能，快速驗證常見流程","B":"導入可重複執行的自動化測試流程，並透過API或服務虛擬化進行模組化驗證","C":"將測試聚焦於使用者介面互動與操作流程驗證，檢查系統表面功能","D":"依靠使用者回饋與正式上線後的監控資料，作為修正依據"},"cats":["g1-1"],"kw_hits":["Low Code","No Code"]},{"id":"114-4-S2-4","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":4,"ans":"A","stem":"某社交平台嘗試結合自動提示工程（Automatic Prompt Engineer, APE）與圖提示（Graph Prompting），讓AI協助分析使用者之間的互動關係。在這個過程中，下列何者為最可能遇到的挑戰？","opts":{"A":"圖結構轉換為文字提示時，可能導致部分關聯資訊遺失","B":"APE在圖資料上無法產生任何提示內容","C":"圖轉文字後能完整保留所有上下文，對推理不造成影響","D":"Graph Prompting僅能處理線性路徑，限制多分支探索"},"cats":["g2-1"],"kw_hits":["Graph Prompting","自動提示工程","APE"]},{"id":"114-4-S2-5","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":5,"ans":"D","stem":"在超長上下文任務中使用自動提示工程（Automatic Prompt Engineer,第二科：生成式AI應用與規劃APE）時，可能面臨的最大限制是什麼？","opts":{"A":"迭代優化難以因應上下文的不斷變動，導致調整失效","B":"模型的記憶容量有限，無法完整保留所有長篇資訊","C":"提示內容難以有效分解，無法支援複雜任務拆解","D":"回饋機制通常僅針對局部片段，難以全面評估最終輸出品質"},"cats":["g2-1","g2-2"],"kw_hits":["自動提示工程","APE","上下文"]},{"id":"114-4-S2-6","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":6,"ans":"B","stem":"某設計團隊計畫在短時間內完成一款行動應用程式，必須同時達到高度個人化體驗、快速生成介面與行銷內容自動產出等需求。若結合No Code/Low Code平台與生成式AI技術，以下哪一種整合策略最能符合目標？","opts":{"A":"使用生成式AI自動產生API呼叫與元件配置，並由開發者手動整合至No Code平台流程","B":"透過生成式AI在No Code平台中自動建立介面模板，並結合使用者數據即時生成個人化功能與行銷推播內容","C":"在No Code平台中導入生成式AI，快速建立跨專案可重用的通用模組，專注於提升開發速度","D":"在No Code平台中完全依賴生成式AI自動產生所有應用功能與流程，不經人工設計或驗證"},"cats":["g1-1"],"kw_hits":["Low Code","No Code","模板"]},{"id":"114-4-S2-7","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":7,"ans":"C","stem":"某團隊希望讓AI自動查詢GitHub上的程式碼庫，並生成摘要給使用者參考。開發者決定透過Model Context Protocol（MCP）來實現，AI需先發出請求，再經由MCP架構逐步完成查詢與回傳。在此情境下，MCP運作流程的正確順序為何？","opts":{"A":"MCP Server→AI Host→MCP Client→資料查詢→結果回傳AI Host","B":"MCP Client→AI Host→MCP Server→資料查詢→結果回傳AI Host","C":"AI Host→MCP Client→MCP Server→資料查詢→結果回傳AI Host","D":"AI Host→MCP Server→MCP Client→資料查詢→結果回傳AI Host"},"cats":["g4-3"],"kw_hits":["Model Context Protocol","MCP"]},{"id":"114-4-S2-8","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":8,"ans":"C","stem":"在Agent-to-Agent（A2A）架構中，不同代理人之間會分工合作。一般而言，下列敘述何者最符合Client Agent與Remote Agent的互動流程？","opts":{"A":"Remote Agent主動分派任務給Client Agent","B":"由人工事先設定Client Agent與Remote Agent處理任務的先後順序；第二科：生成式AI應用與規劃","C":"Client Agent發起任務，Remote Agent執行並回傳結果","D":"Client Agent與Remote Agent同時處理任務並同步處理結果"},"cats":["g4-2"],"kw_hits":["Agent-to-Agent","A2A"]},{"id":"114-4-S2-9","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":9,"ans":"B","stem":"在導入生成式AI的應用規劃中，上下文工程（Context Engineering）的核心目的為何？","opts":{"A":"縮短模型訓練時間","B":"優化提示與上下文","C":"增加模型參數數量","D":"優化Fine-tuning正確率"},"cats":["g2-2"],"kw_hits":["Context Engineering","上下文工程","上下文"]},{"id":"114-4-S2-10","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":10,"ans":"B","stem":"某公司在導入生成式AI協助撰寫內部報告時，測試人員刻意在輸入的上下文中放入互相矛盾的資訊（例如：同一位員工在不同段落被描述為「入職三年」與「入職五年」）。在這種情況下，最常見的模型行為會是什麼？","opts":{"A":"永遠選擇第一段資訊作為答案依據","B":"可能生成幻覺或隨機採信其中一方的內容","C":"拒絕回答，並要求提供更一致的輸入","D":"自動判斷並只選擇正確的資訊"},"cats":["g2-2"],"kw_hits":["互相矛盾","上下文","矛盾"]},{"id":"114-4-S2-11","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":11,"ans":"A","stem":"Agentic AI在解決方案圖譜（Solution Graph）上尋找最佳解決路徑時，通常會使用什麼樣的搜尋策略？","opts":{"A":"使用廣度優先、深度優先或最佳優先等演算法進行探索","B":"每一步都隨機選擇動作，反覆嘗試直到找到一條可行路徑","C":"只執行事先假定的一條路徑，失敗就停止","D":"完全依靠LLM一次性推斷最優完整路徑"},"cats":["g4-2"],"kw_hits":["Solution Graph","解決方案圖譜"]},{"id":"114-4-S2-12","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":12,"ans":"C","stem":"某企業考慮將開源大型語言模型（GPT-OSS）自行部署在本地伺服器，以取代雲端服務。下列何者最能代表本地部署對企業的實際好處？","opts":{"A":"可以達到無運算成本，因為本地部署模型不會產生額外的資源消耗","B":"模型的預測能力會比在雲端運行時更精度，因為本地環境更加可靠","C":"可確保輸入模型的敏感資料不會傳輸給第三方，提升資料隱私和自主控制","D":"以上皆是"},"cats":["g8-2","g6-2"],"kw_hits":["隱私","雲端"]},{"id":"114-4-S2-13","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":13,"ans":"D","stem":"關於GitHub Copilot，下列敘述何者正確？","opts":{"A":"GitHub Copilot基於程式碼片段查詢工具，透過後端搜尋大型程式碼資料庫提供建議；第二科：生成式AI應用與規劃","B":"GitHub Copilot僅適用於GitHub上的開源專案，無法在私有程式碼庫或本地環境中提供程式碼補全建議","C":"GitHub Copilot利用靜態分析技術分析程式碼，根據邏輯流程推導下一步應寫的程式碼","D":"GitHub Copilot由OpenAI的Codex模型提供技術支援，可即時在開發者編輯程式碼時給出整行或整個函式建議"},"cats":["g1-1"],"kw_hits":["GitHub Copilot"]},{"id":"114-4-S2-14","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":14,"ans":"B","stem":"某電商公司導入Agentic AI來處理客服工作。測試發現Agent在回答產品FAQ時經常出錯，且無法幫客戶修改訂單。這種情況最可能是因為缺少下列哪兩項工具或技術？","opts":{"A":"API調用（API Calling）＋任務規劃器（Task Planner）","B":"向量資料庫檢索（Vector Retrieval）＋API調用（API Calling）","C":"向量資料庫檢索（Vector Retrieval）＋任務規劃器（Task Planner）","D":"任務規劃器（Task Planner）＋溫度參數（Temperature）設定"},"cats":["g4-1","g4-2"],"kw_hits":["Task Planner","API Calling","任務規劃器","任務規劃"]},{"id":"114-4-S2-15","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":15,"ans":"B","stem":"某客服自動回應系統希望根據不同客戶群體調整回覆風格。在兼顧即時性與效果的前提下，下列哪一種方案最適合？","opts":{"A":"直接微調預訓練模型針對每個客戶群體分別訓練不同風格模型","B":"利用控制變量（Control Tokens）或風格標籤在同一模型內動態調整風格","C":"利用生成對抗網路（GAN）生成不同風格文本，並透過人工篩選最終答案","D":"採用規則式替換方法，替換回覆詞彙以符合不同風格要求。"},"cats":["g2-2","g5-1","g5-2","g7-2"],"kw_hits":["Token","GAN","即時性","微調"]},{"id":"114-4-S2-16","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":16,"ans":"D","stem":"在建置多代理大型語言模型（Multi-agent LLMs）系統時，如果沒有清楚定義每個代理的任務啟動條件和角色分工，最可能出現什麼問題？","opts":{"A":"回覆內容前後不連貫，系統邏輯斷裂","B":"不同代理的答案互相衝突，無法判斷最終決策","C":"系統陷入無限對話循環，導致資源耗盡","D":"多個代理重複做同樣的任務，造成效率低落"},"cats":["g4-2"],"kw_hits":["Multi-Agent","多代理"]},{"id":"114-4-S2-17","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":17,"ans":"D","stem":"某公司部署結合Fine-tuning與檢索增強生成（RAG）的語言模型系統作為內部文件助理。系統需同時確保回覆語氣一致、能即時查詢每日新增文件、維持效能穩定，並避免頻繁重新訓練。在長期維護與效能平衡下，下列哪一種策略最合適？","opts":{"A":"每週重新Fine-tune模型，將新文件整合進模型知識，逐步取代RAG模組；第二科：生成式AI應用與規劃","B":"完全依靠基礎模型與RAG，不進行Fine-tune，僅透過提示設計控制語氣","C":"每日進行增量Fine-tune，讓模型即時學習新文件內容，避免依賴檢索","D":"保留語氣相關Fine-tuning，僅透過檢索系統更新文件內容，不頻繁改動模型"},"cats":["g3-1","g5-1"],"kw_hits":["Fine-tuning","檢索增強生成","RAG"]},{"id":"114-4-S2-18","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":18,"ans":"D","stem":"某客服系統在回覆「訂單取消政策」時，即使生成溫度固定為0.6，回覆品質仍常出現差異。調查顯示，檢索到的政策內容有時是最新版本，有時則是過時文件，此外Prompt約束不足，微調語料也有模糊描述。若要優先改善品質波動，應先解決下列哪一項問題？","opts":{"A":"調整溫度參數，降低生成隨機性","B":"加強Prompt設計，限制模型表達方式","C":"優化微調語料，減少含糊描述","D":"提升檢索系統品質，確保取得的政策內容正確且最新"},"cats":["g5-1","g5-3"],"kw_hits":["溫度","微調"]},{"id":"114-4-S2-19","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":19,"ans":"B","stem":"某醫院導入了一套智慧系統，由三個模組構成：語音辨識（ASR）→語言模型生成（LLM）→查詢醫療資料庫API。近期發現部分查詢結果錯誤，例如醫師詢問「術後復健流程」時，系統卻誤判為要查詢「術前注意事項」，因此查詢到錯誤的文件。經檢查已排除語音辨識的錯誤，下列何者最可能是造成查詢錯誤的來源？","opts":{"A":"醫療資料庫API對應規則設計不清，造成意圖映射模糊","B":"LLM的Prompt缺乏明確指示，導致語意分類判斷錯誤","C":"查詢API回傳速度過慢，影響系統處理正確性","D":"LLM未經醫療領域微調，難以正確理解專業性詞彙"},"cats":["g1-2"],"kw_hits":["API"]},{"id":"114-4-S2-20","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":20,"ans":"D","stem":"某醫院正在規劃一個AI專案，目的是協助醫師從胸腔X光影像中判斷是否存在肺炎徵兆，團隊卻誤將生成式AI模型運用於影像診斷。下列哪一項最可能成為主要風險？","opts":{"A":"模型在生成報告時語句流暢，但僅在文字表達上有差異，對診斷結果沒有重大影響","B":"模型若資料不足，僅會降低生成報告的完整性，而非影響判斷病灶的正確性","C":"模型偏向生成內容而非分類，但此差異僅影響效率，不會造成誤診風險","D":"模型可能生成與實際影像不符的診斷結論，導致誤判並引發醫療與法律風險第二科：生成式AI應用與規劃"},"cats":["g6-4"],"kw_hits":["法律風險","誤判","誤診"]},{"id":"114-4-S2-21","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":21,"ans":"A","stem":"某公司開發的智慧車載語音助理，可透過語音辨識（ASR）辨識駕駛語音，再由LLM生成回答並查詢車載API。測試中發現：ASR對汽車專業術語辨識錯誤率高；LLM的回覆常不精確；系統回覆延遲雖存在但仍可接受。若目標是「優先提升準確性與回答品質」，下列改進步驟的最合理執行順序為何？1.擴充並標註汽車領域語音資料，微調ASR模型2.微調LLM並加入檢索增強（RAG）3.優化系統架構，引入批次推論降低延遲4.動態調整生成溫度，平衡準確度與多樣性","opts":{"A":"1→2→4→3","B":"2→1→3→4","C":"1→3→2→4","D":"3→1→2→4"},"cats":["g8-1"],"kw_hits":["批次推論","延遲"]},{"id":"114-4-S2-22","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":22,"ans":"C","stem":"一家顧問公司使用生成式AI協助撰寫數據分析報告。雖然模型在測試中表現優異，但其生成的報告多半僅遵循固定段落結構，替換數值或關鍵詞即可完成，卻未能展現針對不同專案的多樣化推理與分析。下列何者為造成這種現象的最合理解釋？","opts":{"A":"模型在生成過程中缺乏對字體與排版的優化能力，因此無法展現分析邏輯","B":"測試資料涵蓋過多統計圖表，導致模型無法專注於文字內容的多樣化表達","C":"模型過度依賴訓練語料中的常見報告範式，導致生成結果以樣板化結構取代真正的推理","D":"模型因無法正確辨識報告中的頁碼與標題層級，才出現樣板化的結果"},"cats":["g7-1"],"kw_hits":["固定段落結構","樣板化"]},{"id":"114-4-S2-23","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":23,"ans":"D","stem":"在應用零樣本提示（Zero-Shot Prompting）時，下列哪一種情境最可能因缺乏示範而失敗，出現語意錯誤或結構錯誤的輸出？","opts":{"A":"要求模型判斷一段影評文字的情感傾向","B":"要求模型將一段新聞摘要濃縮為一句話","C":"要求模型將一段繁體中文翻譯成英文","D":"要求模型從表格中擷取所有城市的最高氣溫"},"cats":["g2-1"],"kw_hits":["Zero-Shot","零樣本提示"]},{"id":"114-4-S2-24","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":24,"ans":"D","stem":"某保險公司計畫導入生成式AI的內部合約查詢系統，協助業務員與法務部門快速解讀保單條款與理賠規範。高層特別強調客戶資料隱私與合規風險控管，即使需要投入較多資源，也必須確保資料不會外洩。在第二科：生成式AI應用與規劃此情況下，下列哪一種策略最符合公司的資料安全與合規優先考量？","opts":{"A":"導入開源模型並由IT團隊自建，後續再逐步補強隱私與合規控管","B":"在需求確認階段即納入法遵與稽核單位，設定準確率KPI，並透過MVP驗證成效","C":"優先使用雲端大型API模型快速部署，並根據使用數據持續調整","D":"投入資源自訓並私有化部署LLM，並同步建立自動化風控機制"},"cats":["g8-2","g1-2","g6-2","g7-1"],"kw_hits":["私有化部署","私有化","MVP","KPI","API","規範","雲端","隱私"]},{"id":"114-4-S2-25","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":25,"ans":"B","stem":"某新創公司開發一套圖像描述生成系統，能根據輸入的照片自動產生說明文字。為了讓產生的描述文字能與圖片資訊精準對應，下列哪一種設計思路最關鍵？","opts":{"A":"強化語言模型的句法與流暢性，確保生成文字更自然易讀","B":"在生成過程中結合圖片特徵與語言建模，讓模型同時利用影像內容與文字資訊","C":"調整生成策略（如Beam Search或溫度參數），以提升輸出文字的合理性","D":"專注於文字序列上下文的建模，只提升文字間的連貫性"},"cats":["g5-2"],"kw_hits":["圖像描述","照片"]},{"id":"114-4-S2-26","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":26,"ans":"C","stem":"某電商平台希望生成的商品描述在風格與用詞上保持一致性，但不需要新增專業知識。下列哪種方法最適合？","opts":{"A":"擴充語料庫並微調模型，使風格統一","B":"增加提示詞複雜度，引導模型風格一致","C":"降低生成溫度，以減少隨機性並提升風格一致性","D":"使用全連接神經網路對生成結果後期篩選"},"cats":["g5-3"],"kw_hits":["風格一致","溫度"]},{"id":"114-4-S2-27","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":27,"ans":"C","stem":"某企業已建置AI語音記錄系統，並希望整合生成式AI進行「會議即時摘要」功能，下列哪一種策略最能提升摘要的語意品質與使用價值？","opts":{"A":"使用語音轉文字模型即時輸出逐字稿並轉入GPT摘要","B":"將語音逐段切分並建立關鍵字索引，以利摘要模型從中擷取核心內容生成會議重點","C":"將語音轉文字後標註發言角色與主題邊界，結合語意分群進行動態摘要","D":"將所有語音內容儲存為完整紀錄，提供事後人工摘要比對用"},"cats":["g3-2"],"kw_hits":["會議即時摘要","語意分群","逐字稿","索引"]},{"id":"114-4-S2-28","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":28,"ans":"B","stem":"某公司正在開發一個智慧客服系統，負責回覆顧客關於退換貨、優惠活動與商品建議等問題。研發團隊嘗試使用不同的提示設計方式來提升模型效能。下列哪一個提示最符合「少樣本提示（Few-Shot Prompting）」的設計原則？","opts":{"A":"「請回答顧客詢問：如何申請退貨？」；第二科：生成式AI應用與規劃","B":"「以下是兩組客服對話範例，請依照相同風格回覆新的顧客問題」","C":"「請逐步分析顧客投訴的原因，並依照推理過程生成合適回覆」","D":"「請以正式的語氣回覆顧客的提問」"},"cats":["g2-1"],"kw_hits":["Few-Shot","少樣本提示"]},{"id":"114-4-S2-29","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":29,"ans":"C","stem":"某投資公司導入生成式AI，用於即時分析股市波動並提供市場背景資訊。若希望AI能兼顧「即時性」與「可靠性」。下列哪一項設計最能有效提升AI在即時股市分析上的表現？","opts":{"A":"將AI系統連結至公司內部歷史交易資料庫，以便快速調用既有的案例參考","B":"調整模型的回應邏輯，讓AI優先輸出最新市場行情，而不是完整的背景分析","C":"建立與外部即時行情來源同步的查詢模組，確保AI能即時擷取最新金融數據","D":"增加訓練資料中模擬的金融危機與市場異常案例，以提升AI在特殊情境下的表現能力"},"cats":["g7-2"],"kw_hits":["投資公司","股市波動","可靠性","即時性"]},{"id":"114-4-S2-30","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":30,"ans":"A","stem":"某大型物流公司計畫導入AI系統，以改善客服與配送作業的效率。專案團隊規劃了以下四個步驟，請問正確的執行順序為何？1.建立符合公司服務流程的AI對話邏輯與應答範本，確保顧客體驗一致2.明確定義導入AI的目標並設定關鍵績效指標（KPI）3.蒐集與清理過往客服紀錄與配送相關資料，作為模型訓練素材4.評估並選擇合適的AI技術供應商或開源方案，確立技術方向與架構","opts":{"A":"2→3→4→1","B":"3→2→1→4","C":"2→1→3→4","D":"1→4→3→2"},"cats":["g7-1"],"kw_hits":["關鍵績效指標","KPI"]},{"id":"114-4-S2-31","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":31,"ans":"B","stem":"某跨國電商企業導入生成式AI，協助處理顧客服務請求，並根據顧客歷史訂單提供個人化建議。資安與法遵部門擔心AI在回覆時可能洩漏顧客個資，若要在導入初期優先避免觸法風險，下列哪一項措施最符合要求？","opts":{"A":"在加密環境下導入完整的顧客訂單與行為資料，並透過嚴格存取控管降低洩漏風險","B":"實施資料最小化與去識別化，確保AI在訓練與生成過程中不直接處理或暴露敏感個資；第二科：生成式AI應用與規劃","C":"強化模型的回覆審查流程，透過自動過濾與人工抽查結合，降低個資外洩的機率","D":"設定AI的角色與回覆範圍，讓其專注於客服相關內容，避免回答其他敏感議題"},"cats":["g6-2","g6-1"],"kw_hits":["去識別化","資安"]},{"id":"114-4-S2-32","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":32,"ans":"A","stem":"某國際銀行導入生成式AI，用於彙整不同國家金融監管機構的合規規範，建立跨國合規知識庫。由於各國條文表述方式不同，且監管要求具有高度專業性與隱含邏輯，若要確保知識庫在後續查詢與生成報告時能維持正確性與一致性，下列哪一項AI能力最為關鍵？","opts":{"A":"具備跨語言專業術語對齊與條文語意抽取能力，能正確辨識不同國家規範間的對應與差異","B":"能自動最佳化文件檢索效率，縮短跨國法規查詢的延遲時間，提升合規部門使用體驗","C":"能將合規文件轉換為多種輸出形式（如簡報、摘要或法規清單），以符合不同決策層級需求","D":"具備根據歷史案例生成合規解釋的能力，協助新進員工快速理解法規在實務上的應用"},"cats":["g1-2","g2-1","g3-1","g8-1"],"kw_hits":["使用體驗","知識庫","延遲","規範"]},{"id":"114-4-S2-33","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":33,"ans":"C","stem":"在企業導入MLOps（Machine Learning Operations）的過程中，除了模型部署與維運挑戰外，仍可能面臨其他推動上的困難。下列何者為No Code平台最能有效解決的挑戰？","opts":{"A":"自動化大量資料的標註與前處理，以降低數據準備成本","B":"提升運算基礎設施的可擴展性，以因應大規模服務需求","C":"透過可視化建模介面，降低技術門檻並促進跨部門協作","D":"提供進階特徵工程能力，優化高維度數據的處理效率"},"cats":["g1-1"],"kw_hits":["No Code"]},{"id":"114-4-S2-34","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":34,"ans":"B","stem":"某醫療機構計畫導入生成式AI協助撰寫病歷摘要。在技術測試階段，為確保系統能安全應用於臨床，最應優先關注下列哪一項指標？","opts":{"A":"資料儲存與存取架構的完整性，確保長期運作過程中的數據可追溯性","B":"生成內容的醫療準確性與臨床一致性，避免出現錯誤或誤導性資訊","C":"模型在不同病例語境下的泛化能力，確保不因個別樣本而偏差","D":"系統回應時間的穩定性，以支援醫療場域中可能的即時需求"},"cats":["g6-4"],"kw_hits":["醫療準確性","病歷摘要","臨床"]},{"id":"114-4-S2-35","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":35,"ans":"B","stem":"在即時客服系統的效能測試中，若針對延遲測試（Latency Testing）進行評估，下列哪一項指標最能反映系統是否符合用戶即時互動需求？第二科：生成式AI應用與規劃","opts":{"A":"AI模型在同一分鐘內可完成的回覆訊息數量","B":"客戶從輸入問題到收到第一個完整回應所需的時間","C":"客服系統能連續提供服務的運行時長","D":"AI產生回答時用詞的多樣性與表達創意程度"},"cats":["g8-1"],"kw_hits":["Latency","效能測試","延遲"]},{"id":"114-4-S2-36","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":36,"ans":"A","stem":"某航空公司導入生成式AI聲控客服，提供航班與票務查詢。有人員透過惡意提示，試圖讓系統洩漏內部安檢流程。在此情境中，下列何者為降低提示攻擊（Prompt Injection）風險的最佳策略？","opts":{"A":"導入輸入檢測與回應審核流程，防止敏感指令被執行","B":"限制AI可回應的主題範圍，使系統僅回答非敏感的航班與票務查詢，避免處理內部或敏感流程資訊","C":"隨機變化回覆內容，讓攻擊者難以預測回應行為以增加攻擊難度","D":"擴充與更新航班與票務資料來源，以提升模型的知識正確性與覆蓋率"},"cats":["g6-1"],"kw_hits":["Prompt Injection"]},{"id":"114-4-S2-37","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":37,"ans":"A","stem":"在機器學習模型的實務應用中，常會出現數據漂移（Data Drift）的情況。此現象主要是指下列哪一種情況？","opts":{"A":"訓練時使用的資料分佈，與部署後實際輸入資料的統計特徵隨時間逐漸出現差異，導致模型表現衰退","B":"在資料前處理過程中，因特徵刪減或缺失補值不當，造成樣本資訊量下降","C":"模型對訓練數據擬合過度，在未知數據上泛化能力不足","D":"後端資料庫因欄位定義或結構調整，導致特徵提取流程與原始設計不一致"},"cats":["g9-1"],"kw_hits":["Data Drift"]},{"id":"114-4-S2-38","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":38,"ans":"C","stem":"某銀行導入生成式AI放貸審核系統，用於分析申貸人條件並生成初步審核意見。測試過程中發現，模型對不同族群的核准率存在顯著差異，可能引發演算法偏見問題。為降低此風險，下列哪一項措施最合適？","opts":{"A":"提升模型運算速度與效能，以確保在大量申請中快速回應","B":"全面移除與申貸人身份相關的敏感屬性，避免模型因變數影響而產生偏差","C":"導入資料與結果的公平性檢測流程，並依合規規範調整模型或決策邏輯","D":"減少訓練樣本數量，降低偏見被放大的可能性"},"cats":["g6-3"],"kw_hits":["公平性","偏見"]},{"id":"114-4-S2-39","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":39,"ans":"A","stem":"在提示工程（Prompt Engineering）的應用中，Chain-of-Thought（CoT）與Tree of Thoughts（ToT）各適用於不同的推理情境，請問以下兩個情境，分別最適合採用哪一種方法？第二科：生成式AI應用與規劃情境一：電商公司開發客服助理，用來協助客戶查詢退款流程與相關規範情境二：活動策劃團隊使用AI協助規劃多場跨部門行銷活動，需要同時考量預算、場地、時程與人力資源，並比較不同方案的可行性。","opts":{"A":"情境一採用CoT，情境二採用ToT","B":"情境一採用ToT，情境二採用CoT","C":"情境一與情境二都適合CoT","D":"情境一與情境二都適合ToT"},"cats":["g2-1"],"kw_hits":["Tree of Thoughts","ToT","CoT"]},{"id":"114-4-S2-40","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":40,"ans":"D","stem":"在生成式AI的提示工程中，Graph Prompting在處理複雜關係資料時，為何通常比Chain-of-Thought（CoT）更有效？","opts":{"A":"Graph Prompting幾乎不需要推理，只依靠圖結構即可得出結論","B":"Graph Prompting僅需單次提示，即可避免多輪推理的誤差累積","C":"Graph Prompting的生成速度通常更快，因此效率更高","D":"Graph Prompting能捕捉非線性結構與上下文關聯，適合處理網絡化資訊"},"cats":["g2-1"],"kw_hits":["Graph Prompting","CoT"]},{"id":"114-4-S2-41","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":41,"ans":"A","stem":"在少樣本提示（Few-shot Prompting）僅能提供1–2個範例的情況下，若遇到領域偏移（Domain Shift），下列何者為模型最可能面臨的核心挑戰？","opts":{"A":"範例數量過少，無法涵蓋新領域的多樣性，導致模型泛化不足","B":"範例表徵有限，模型容易依賴單一樣本特性而降低適應力","C":"範例覆蓋不足，使模型難以抽取跨領域的穩定模式","D":"範例資訊過於稀缺，模型缺乏應對不同輸入情境的能力"},"cats":["g2-1"],"kw_hits":["Few-Shot","少樣本提示"]},{"id":"114-4-S2-42","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":42,"ans":"A","stem":"某金融機構導入檢索增強生成（Retrieval-Augmented Generation, RAG）模型，用於客服文件查詢與自動回覆。由於大型模型運算成本過高，若考慮引入知識蒸餾（Knowledge Distillation, KD）技術，下列何者為帶來的主要效益？","opts":{"A":"讓小型模型學習大型模型的知識，在降低運算成本的同時維持檢索與生成品質","B":"只能應用於語音或影像辨識，無法提升文字檢索生成效能","C":"因為RAG已有檢索機制，因此無需額外蒸餾知識","D":"僅能依賴特定API供應商才能使用，無法在自建模型中實現"},"cats":["g3-1","g3-2"],"kw_hits":["Knowledge Distillation","檢索增強生成","知識蒸餾","RAG"]},{"id":"114-4-S2-43","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":43,"ans":"D","stem":"在評估大型語言模型，例如7B、13B、175B參數規模時，模型規模對基準測試（Benchmark）結果的影響，下列哪一種說法最為恰當？","opts":{"A":"小模型在正確調整下能超越大模型，因此模型大小並不重要；第二科：生成式AI應用與規劃","B":"大模型在多數情境下表現較好，但在特定任務上略遜於小模型","C":"模型規模與基準測試結果完全無關，影響主要來自測試設計","D":"模型越大，Benchmark結果可能提升，但幅度取決於訓練數據品質與資源配置"},"cats":["g9-2"],"kw_hits":["Benchmark"]},{"id":"114-4-S2-44","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":44,"ans":"C","stem":"在AI應用設計中，Model Context Protocol（MCP）與檢索增強生成（RAG）都能擴展模型的能力，但兩者的核心差異主要為下列何者？","opts":{"A":"MCP擴展模型工具，但主要用於補足訓練資料不足","B":"MCP能標準化連接資源，但仍需依賴向量資料庫","C":"RAG常用於擴展知識庫內容，而MCP更著重於動態工具與API呼叫的整合","D":"RAG透過統一協議，提升回答相關性"},"cats":["g3-1","g4-3"],"kw_hits":["Model Context Protocol","檢索增強生成","向量資料庫","MCP","RAG","知識庫"]},{"id":"114-4-S2-45","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":45,"ans":"A","stem":"下列哪一個資料集專門設計用於測試大型語言模型在多領域、多任務語言理解中，涵蓋人文、科學與社會科學等領域，而非專門用於數學推理或中文專業知識？","opts":{"A":"MMLU","B":"GSM8K","C":"MATH","D":"C-Eval"},"cats":["g9-2"],"kw_hits":["GSM8K","MMLU"]},{"id":"114-4-S2-46","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":46,"ans":"D","stem":"某智慧工廠導入生成式AI，協助產線工程師即時產生維修指引與操作建議。下列哪一項並非團隊在系統設計中加入Guardrails（防護機制）的主要目的？","opts":{"A":"檢查工程師輸入內容，避免觸發錯誤或危險需求","B":"過濾與驗證AI輸出的維修指引，確保符合安全標準","C":"確保生成的操作建議符合法規與產業安全規範","D":"完整重建並追蹤AI模型的全部推理過程"},"cats":["g6-1"],"kw_hits":["Guardrails","防護機制"]},{"id":"114-4-S2-47","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":47,"ans":"B","stem":"某顧問公司導入生成式AI，協助團隊快速檢索並摘要長篇的法規文件。為了改善檢索結果常出現不相關或過於分散內容的問題，下列何者為團隊決定對文件進行文本切分（Chunking）的主要目的？","opts":{"A":"讓模型在回答時能加快推理速度","B":"提高檢索相關性與降低長上下文噪音","C":"降低系統記憶體和硬體資源的負擔","D":"使模型在生成回覆時更具創造性與多樣化"},"cats":["g2-2","g3-2"],"kw_hits":["Chunking","上下文"]},{"id":"114-4-S2-48","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":48,"ans":"A","stem":"某開發團隊在建置企業內部知識檢索系統時，選擇採用多向量檢索器（Multi-vector Retriever），下列何者為協助提升系統查詢的完整性第二科：生成式AI應用與規劃與精準度的主要方式？","opts":{"A":"支援同時處理多種資訊表示，提升跨文本型態的檢索效果","B":"透過多向量壓縮與共享權重方式，降低檢索過程的運算與儲存成本","C":"以切分並過濾文件片段，減少上下文長度帶來的Token負擔","D":"透過調整生成階段的溫度參數，使模型在回覆時更穩定一致"},"cats":["g2-2"],"kw_hits":["Token","上下文"]},{"id":"114-4-S2-49","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":49,"ans":"D","stem":"在Agentic AI的架構中，解決方案圖譜（Solution Graph）常被用來輔助代理的任務執行，其主要作用為何？","opts":{"A":"透過圖形結構完全取代大型語言模型的推理，讓代理只依靠圖演算法完成任務","B":"僅用於保存代理的輸出結果，方便後續檢視與審計，而不影響實際推理流程","C":"將代理限制在既定流程內，避免其產生偏離設計腳本的行為","D":"作為代理在執行過程中的參考框架，用於組織決策步驟並支援任務推理"},"cats":["g4-2"],"kw_hits":["Solution Graph","解決方案圖譜"]},{"id":"114-4-S2-50","subject":"S2","batch":"114年第四梯次","batch_id":"114-4","num":50,"ans":"C","stem":"小明想開發一個部落格寫作工具，讓用戶輸入文章開頭後，系統自動幫忙寫出後續內容，例如輸入「今天去了台北木柵動物園...」，系統就能續寫。若要實現這樣的功能，最適合選擇下列哪一類任務？","opts":{"A":"序列到序列建模（Sequence-to-Sequence Modeling），透過輸入序列產生新的輸出序列","B":"遮罩語言建模（Masked Language Modeling），補齊文字中缺失的詞語或片段","C":"生成式語言建模（Text Generation），依據上下文持續產生新的內容","D":"文本分類（Text Classification），針對輸入文本判斷情感、主題或標籤"},"cats":["g5-2"],"kw_hits":["Sequence-to-Sequence","序列到序列","部落格","續寫"]},{"id":"115-1-S1-1","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":1,"ans":"D","stem":"下列何者不屬於資料整合（Data Integration）的主要目的？","opts":{"A":"統一不同來源資料的格式與欄位定義，以確保分析一致性","B":"識別並處理重複資料，避免影響模型訓練結果","C":"整併多來源資料，以提升資料完整性與應用價值","D":"依資料保存政策延長原始資料留存期限，以利未來可能的分析需求"},"cats":["t2-1"],"kw_hits":["Data Integration","資料整合","重複資料"]},{"id":"115-1-S1-2","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":2,"ans":"D","stem":"某智慧城市專案導入AI技術，以優化垃圾收集路線調度並即時監測空氣品質變化。系統需持續蒐集環境數據（如PM2.5、氣體濃度）與設備狀態（如垃圾桶滿溢度）。下列何種技術最直接支援上述需求？","opts":{"A":"專家系統（Expert System）","B":"決策支援系統（Decision Support System）","C":"啟發式決策引擎（Heuristic Decision Engine）","D":"感知器網路（Sensor Network）"},"cats":["t1-1","t3-1d"],"kw_hits":["專家系統","狀態","環境"]},{"id":"115-1-S1-3","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":3,"ans":"D","stem":"下列何者不符合非監督式學習（Unsupervised Learning）的典型特徵？","opts":{"A":"模型可依據資料中的特徵相似性進行自動分群","B":"訓練過程中不需仰賴事先定義的標籤資料","C":"常用於探索資料的潛在結構或隱含模式","D":"模型主要學習輸入特徵與既定目標標記之間的對應關係"},"cats":["t3-1b","t3-1a"],"kw_hits":["Unsupervised Learning","Supervised Learning","非監督式學習","監督式學習","分群"]},{"id":"115-1-S1-4","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":4,"ans":"C","stem":"某保險公司建立AI理賠金額預測模型。歷史理賠資料經檢定後呈近似常態分佈，但仍存在少數極端高額案件。資料科學團隊在不破壞整體分佈特性的前提下，規劃進行離群值處理。下列何者最不適當？","opts":{"A":"依統計準則（如Z-score或IQR）評估後，再決定是否調整或處理極端值","B":"採用截尾（Trimming）處理極端值，以提升模型穩定性","C":"使用One-hot編碼（One-hot Encoding）將離群值轉換為類別特徵以改善數值穩定性","D":"結合領域知識評估其合理性，再決定保留或修正"},"cats":["t2-1","t3-3","t2-2"],"kw_hits":["Z-score","極端值","IQR"]},{"id":"115-1-S1-5","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":5,"ans":"B","stem":"某銀行建立AI詐欺交易偵測模型。歷史交易資料中，詐欺樣本比例極低，導致模型訓練時偏向預測為「正常交易」。資料科學團隊評估採用SMOTE（Synthetic Minority Over-sampling Technique）改善訓練資料分佈。下列何者最符合SMOTE技術的主要功能？","opts":{"A":"透過隨機刪除部分正常交易資料，以降低類別失衡程度","B":"依據少數類別樣本的特徵空間，合成產生新的少數類別樣本","C":"調整模型的損失函數（Loss Function）權重，使誤判少數類別時的懲罰提高","D":"以交叉驗證（Cross-validation）方式重新分割資料集，使各折資料類別比例一第一科：人工智慧基礎概論致"},"cats":["t2-1","t3-1b"],"kw_hits":["Cross-validation","SMOTE","交叉驗證"]},{"id":"115-1-S1-6","subject":"S1","batch":"115年第一次","batch_id":"115-1","num":6,"ans":"C","stem":"資料科學團隊在模型訓練前，需對數值特徵進行正規化（Normalization）或標準化（Standardization）。為確保模型評估結果具真實性並避免資料洩漏（Data Leakage），下列何者為最適當的作法？","opts":{"A":"於資料分割前，先對完整資料集計算統計量並進行標準化處理","B":"先分割訓練資料（Training Data）和測試資料（Test Data
